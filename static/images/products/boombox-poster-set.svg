<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#05050a"/>
  <!-- Boombox body -->
  <rect x="60" y="155" width="280" height="130" rx="8" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Handle -->
  <path d="M140,155 L140,130 Q200,110 260,130 L260,155" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Left speaker -->
  <circle cx="135" cy="220" r="40" fill="none" stroke="#4d4dff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="135" cy="220" r="25" fill="none" stroke="#4d4dff" stroke-width="1" opacity="0.5"/>
  <circle cx="135" cy="220" r="10" fill="none" stroke="#00ffde" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Right speaker -->
  <circle cx="265" cy="220" r="40" fill="none" stroke="#4d4dff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="265" cy="220" r="25" fill="none" stroke="#4d4dff" stroke-width="1" opacity="0.5"/>
  <circle cx="265" cy="220" r="10" fill="none" stroke="#00ffde" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Cassette deck in center -->
  <rect x="170" y="195" width="60" height="35" rx="3" fill="none" stroke="#ff2040" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="185" cy="212" r="6" fill="none" stroke="#ff2040" stroke-width="1"/>
  <circle cx="215" cy="212" r="6" fill="none" stroke="#ff2040" stroke-width="1"/>
  <!-- EQ bars -->
  <rect x="175" y="240" width="4" height="18" fill="#ffcc00" opacity="0.6"/>
  <rect x="183" y="245" width="4" height="13" fill="#39ff14" opacity="0.6"/>
  <rect x="191" y="238" width="4" height="20" fill="#ff2040" opacity="0.6"/>
  <rect x="199" y="243" width="4" height="15" fill="#00ffde" opacity="0.6"/>
  <rect x="207" y="240" width="4" height="18" fill="#ffcc00" opacity="0.6"/>
  <rect x="215" y="247" width="4" height="11" fill="#ffb8ff" opacity="0.6"/>
  <rect x="223" y="236" width="4" height="22" fill="#4d4dff" opacity="0.8"/>
  <!-- Sound waves -->
  <path d="M340,200 Q355,220 340,240" fill="none" stroke="#ffcc00" stroke-width="1.5" opacity="0.4"/>
  <path d="M350,190 Q370,220 350,250" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.3"/>
</svg>

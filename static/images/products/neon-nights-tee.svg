<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0040"/>
      <stop offset="60%" stop-color="#ff2040" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#05050a"/>
  <!-- T-shirt silhouette -->
  <path d="M120,140 L100,160 L80,155 L65,175 L95,195 L105,175 L105,300 L295,300 L295,175 L305,195 L335,175 L320,155 L300,160 L280,140 L230,130 C220,145 180,145 170,130 Z"
        fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Cityscape on shirt -->
  <rect x="135" y="190" width="12" height="60" fill="none" stroke="#4d4dff" stroke-width="1.5" opacity="0.8"/>
  <rect x="155" y="175" width="14" height="75" fill="none" stroke="#ff2040" stroke-width="1.5" opacity="0.8"/>
  <rect x="177" y="185" width="10" height="65" fill="none" stroke="#00ffde" stroke-width="1.5" opacity="0.8"/>
  <rect x="195" y="170" width="16" height="80" fill="none" stroke="#ffcc00" stroke-width="1.5" opacity="0.8"/>
  <rect x="219" y="180" width="12" height="70" fill="none" stroke="#ffb8ff" stroke-width="1.5" opacity="0.8"/>
  <rect x="239" y="195" width="10" height="55" fill="none" stroke="#4d4dff" stroke-width="1.5" opacity="0.8"/>
  <rect x="257" y="188" width="8" height="62" fill="none" stroke="#00ffde" stroke-width="1.5" opacity="0.8"/>
  <!-- Windows on buildings -->
  <rect x="158" y="180" width="3" height="3" fill="#ffcc00" opacity="0.6"/>
  <rect x="163" y="185" width="3" height="3" fill="#ffcc00" opacity="0.4"/>
  <rect x="198" y="178" width="3" height="3" fill="#ff2040" opacity="0.5"/>
  <rect x="205" y="190" width="3" height="3" fill="#00ffde" opacity="0.6"/>
  <rect x="198" y="195" width="3" height="3" fill="#ffcc00" opacity="0.4"/>
  <rect x="222" y="188" width="3" height="3" fill="#ffb8ff" opacity="0.5"/>
  <!-- Horizon glow -->
  <line x1="130" y1="250" x2="270" y2="250" stroke="#ff2040" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
</svg>

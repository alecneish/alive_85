<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#05050a"/>
  <!-- Cassette body -->
  <rect x="70" y="130" width="260" height="165" rx="10" fill="none" stroke="#00ffde" stroke-width="2" filter="url(#glow)"/>
  <!-- Inner border -->
  <rect x="82" y="142" width="236" height="141" rx="6" fill="none" stroke="#00ffde" stroke-width="1" opacity="0.3"/>
  <!-- Label area -->
  <rect x="100" y="150" width="200" height="70" rx="4" fill="none" stroke="#4d4dff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Label text -->
  <text x="200" y="175" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="14" fill="#ffcc00" filter="url(#glow)">alive85</text>
  <text x="200" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffb8ff" opacity="0.7">SIDE A  REWIND &amp; RELIVE</text>
  <line x1="110" y1="205" x2="290" y2="205" stroke="#4d4dff" stroke-width="0.5" opacity="0.4"/>
  <text x="200" y="215" text-anchor="middle" font-family="monospace" font-size="7" fill="#4d4dff" opacity="0.5">C-60 � NR � CrO�</text>
  <!-- Spools -->
  <circle cx="150" cy="265" r="22" fill="none" stroke="#00ffde" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="150" cy="265" r="8" fill="none" stroke="#00ffde" stroke-width="1"/>
  <circle cx="250" cy="265" r="22" fill="none" stroke="#00ffde" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="250" cy="265" r="8" fill="none" stroke="#00ffde" stroke-width="1"/>
  <!-- Tape window -->
  <rect x="165" y="247" width="70" height="36" rx="3" fill="none" stroke="#00ffde" stroke-width="1" opacity="0.5"/>
  <!-- Tape -->
  <line x1="172" y1="265" x2="228" y2="265" stroke="#ff2040" stroke-width="1" opacity="0.5"/>
  <!-- Screw holes -->
  <circle cx="90" cy="148" r="3" fill="none" stroke="#00ffde" stroke-width="0.5" opacity="0.4"/>
  <circle cx="310" cy="148" r="3" fill="none" stroke="#00ffde" stroke-width="0.5" opacity="0.4"/>
  <circle cx="90" cy="277" r="3" fill="none" stroke="#00ffde" stroke-width="0.5" opacity="0.4"/>
  <circle cx="310" cy="277" r="3" fill="none" stroke="#00ffde" stroke-width="0.5" opacity="0.4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d4dff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ffde" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#05050a"/>
  <!-- Bridge -->
  <path d="M170,185 Q200,175 230,185" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Left lens -->
  <path d="M80,190 Q80,165 120,165 L170,180 Q175,210 165,240 Q140,260 105,255 Q70,245 70,215 Z"
        fill="url(#lensGrad)" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Right lens -->
  <path d="M320,190 Q320,165 280,165 L230,180 Q225,210 235,240 Q260,260 295,255 Q330,245 330,215 Z"
        fill="url(#lensGrad)" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Left temple -->
  <path d="M80,190 L40,185 Q30,185 25,190 L25,195" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Right temple -->
  <path d="M320,190 L360,185 Q370,185 375,190 L375,195" fill="none" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <!-- Lens reflections -->
  <path d="M95,180 Q110,178 125,182" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <path d="M265,180 Q280,178 295,182" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <!-- Subtle glow spots -->
  <circle cx="120" cy="210" r="2" fill="#00ffde" opacity="0.4"/>
  <circle cx="280" cy="210" r="2" fill="#00ffde" opacity="0.4"/>
</svg>
